<!DOCTYPE html>
<html lang="ko">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-MCD92GR2XF"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-MCD92GR2XF');
    </script>
    <meta charset="UTF-8">
    <title>Naver Blog HTML Converter</title>
    <style>
        :root { --main-green: #03cf5d; --bg-dark: #1a1a1a; }
        body { width: 350px; padding: 20px; background-color: var(--bg-dark); color: #fff; font-family: 'Malgun Gothic', sans-serif; margin: 0; }
        .header { text-align: center; border-bottom: 1px solid #444; padding-bottom: 15px; margin-bottom: 15px; }
        .title { margin: 0; font-size: 19px; font-weight: bold; color: #fff; }
        .sub-title { font-size: 12px; color: #888; margin-top: 5px; }
        textarea { width: 100%; height: 200px; background: #333; color: #fff; border: 1px solid #444; border-radius: 8px; padding: 12px; box-sizing: border-box; resize: none; margin-bottom: 15px; font-size: 13px; }
        button { width: 100%; padding: 13px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .btn-primary { background-color: var(--main-green); color: white; }
        .btn-google { background-color: #fff; color: #000; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .hidden { display: none; }
        .footer { font-size: 11px; color: #666; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">네이버 블로그 HTML 변환기</div>
        <div class="sub-title">HTML을 에디터 형식으로 자동 변환합니다</div>
    </div>

    <div id="loginSection">
        <button id="googleLoginBtn" class="btn-google">Google로 로그인</button>
    </div>

    <div id="mainSection" class="hidden">
        <textarea id="htmlInput" placeholder="여기에 HTML 코드를 붙여넣으세요."></textarea>
        <button id="convertBtn" class="btn-primary">블로그에 삽입 (복사)</button>
        <div class="footer">무제한 버전이 활성화되었습니다.</div>
    </div>

    <div id="tempArea" style="position: absolute; left: -9999px; white-space: pre-wrap;"></div>
    <script src="popup.js"></script>
</body>
</html>
