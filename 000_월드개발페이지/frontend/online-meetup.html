<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>온라인 밋업일정 - WORLD</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .event-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .event-card:hover {
            transform: translateX(8px);
            background: rgba(99, 102, 241, 0.05);
        }
    </style>
</head>
<body class="antialiased overflow-x-hidden bg-bg-light dark:bg-bg-dark text-slate-900 dark:text-slate-100 transition-colors duration-300">
    <div class="full-bg">
        <div class="content-container min-h-screen flex flex-col">
            <!-- Header -->
            <header class="w-full bg-[#030509]/80 backdrop-blur-md border-b border-white/5 px-8 py-4 flex justify-between items-center transition-all duration-300 sticky top-0 z-50">
                <!-- Left Logo -->
                <div class="flex items-center space-x-3">
                    <a href="index.html" class="text-xl font-black tracking-tighter flex items-center gap-2 group">
                        <div class="w-6 h-6 rounded-full bg-gradient-to-tr from-cyan-400 via-indigo-500 to-purple-500 relative flex items-center justify-center shadow-lg group-hover:scale-110 transition duration-300">
                            <div class="absolute w-7.5 h-3 border border-white/60 rounded-full rotate-[-30deg]"></div>
                        </div>
                        <span class="text-white font-extrabold text-lg tracking-widest uppercase">WORLD</span>
                    </a>
                </div>

                <!-- Center GNB Tabs -->
                <nav class="hidden md:flex items-center space-x-8 text-sm font-bold text-slate-400">
                    <a href="index.html" class="hover:text-white transition duration-200">홈</a>
                    <a href="meetup-calendar.html" class="hover:text-white transition duration-200">밋업</a>
                    <a href="workspace/index.html?view=styler" class="hover:text-white transition duration-200">블로그/티스토리</a>
                    <a href="autohunter-download.html" class="hover:text-white transition duration-200">오토메이플</a>
                    <a href="#" id="nav-feedback" class="hover:text-white transition duration-200">피드백</a>
                </nav>

                <!-- Right Buttons -->
                <div class="flex items-center space-x-3 text-[11px] font-semibold">
                    <button class="open-auth px-4 py-1.5 rounded-full border border-white/10 bg-white/5 hover:bg-white/10 text-gray-200 hover:text-white transition flex items-center gap-1.5">
                        <span>🔑</span> 로그인 / 가입
                    </button>
                    <a href="openform-download.html" class="px-4 py-1.5 rounded-full border border-indigo-500/30 bg-indigo-500/10 hover:bg-indigo-500/20 text-indigo-300 hover:text-indigo-200 transition flex items-center gap-1.5">
                        <span>⏱️</span> 패치노트
                    </a>
                </div>
            </header>

        <main class="flex-grow p-8 max-w-5xl mx-auto w-full">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-12 gap-6">
                <div>
                    <h1 class="text-5xl font-black text-slate-900 dark:text-white mb-3 tracking-tighter">📅 온라인 밋업일정</h1>
                    <p class="text-slate-500 dark:text-gray-400 font-medium">실시간 일정을 한눈에 확인하고 손쉽게 관리하세요.</p>
                </div>
                <button onclick="toggleAddForm()" class="px-8 py-3.5 rounded-2xl bg-indigo-600 hover:bg-indigo-500 text-white font-black text-sm transition-all shadow-[0_0_20px_rgba(79,70,229,0.3)] hover:shadow-[0_0_30px_rgba(79,70,229,0.5)] active:scale-95">
                    + 일정 추가하기
                </button>
            </div>

            <div class="grid lg:grid-cols-3 gap-10">
                <!-- Add Form (Hidden by default) -->
                <div id="add-form-container" class="lg:col-span-1 hidden animate-in">
                    <div class="glass-card p-8 rounded-3xl border border-black/5 dark:border-white/10 sticky top-24 shadow-2xl">
                        <h3 class="text-xl font-black mb-6 flex items-center gap-2">
                            <span class="w-2 h-6 bg-indigo-500 rounded-full"></span>
                            일정 등록
                        </h3>
                        <div class="space-y-5">
                            <div>
                                <label class="block text-[11px] font-black text-slate-400 uppercase tracking-widest mb-2">밋업 제목</label>
                                <input type="text" id="event-title" class="w-full px-4 py-3 rounded-xl bg-black/5 dark:bg-white/5 border border-black/10 dark:border-white/10 focus:border-indigo-500 focus:outline-none text-sm transition" placeholder="예: 서비스 기획 세미나">
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-[11px] font-black text-slate-400 uppercase tracking-widest mb-2">날짜</label>
                                    <input type="date" id="event-date" class="w-full px-4 py-3 rounded-xl bg-black/5 dark:bg-white/5 border border-black/10 dark:border-white/10 focus:border-indigo-500 focus:outline-none text-sm transition">
                                </div>
                                <div>
                                    <label class="block text-[11px] font-black text-slate-400 uppercase tracking-widest mb-2">시간</label>
                                    <input type="time" id="event-time" class="w-full px-4 py-3 rounded-xl bg-black/5 dark:bg-white/5 border border-black/10 dark:border-white/10 focus:border-indigo-500 focus:outline-none text-sm transition">
                                </div>
                            </div>
                            <div>
                                <label class="block text-[11px] font-black text-slate-400 uppercase tracking-widest mb-2">링크 (Optional)</label>
                                <input type="text" id="event-link" class="w-full px-4 py-3 rounded-xl bg-black/5 dark:bg-white/5 border border-black/10 dark:border-white/10 focus:border-indigo-500 focus:outline-none text-sm transition" placeholder="Zoom 또는 Google Meet 링크">
                            </div>
                            <button onclick="addEvent()" class="w-full py-4 rounded-2xl bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-black text-sm transition-all hover:opacity-90 active:scale-95 mt-4">일정 저장</button>
                        </div>
                    </div>
                </div>

                <!-- Event List -->
                <div id="event-list-container" class="lg:col-span-3 space-y-4">
                    <!-- Event Item Example -->
                    <div class="event-card group flex items-center justify-between p-6 rounded-3xl glass-card border border-black/5 dark:border-white/10 shadow-lg">
                        <div class="flex items-center gap-6">
                            <div class="flex flex-col items-center justify-center w-20 h-20 rounded-2xl bg-indigo-50 dark:bg-indigo-950/30 border border-indigo-100 dark:border-indigo-500/20">
                                <span class="text-[10px] font-black text-indigo-500 uppercase">MAY</span>
                                <span class="text-3xl font-black text-slate-900 dark:text-white">25</span>
                            </div>
                            <div>
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="px-2 py-0.5 rounded text-[10px] font-black bg-emerald-100 dark:bg-emerald-900/40 text-emerald-600 dark:text-emerald-400 uppercase">Upcoming</span>
                                    <span class="text-xs font-bold text-slate-400">20:00 - 21:30</span>
                                </div>
                                <h3 class="text-xl font-black text-slate-900 dark:text-white tracking-tight">비즈니스 자동화 워크숍</h3>
                                <p class="text-xs text-slate-500 dark:text-gray-400 mt-1">온라인 (Zoom) • 정원 50명</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-3">
                            <button class="p-3 rounded-xl bg-black/5 dark:bg-white/5 text-slate-400 hover:text-indigo-500 transition-colors">수정</button>
                            <button class="p-3 rounded-xl bg-black/5 dark:bg-white/5 text-slate-400 hover:text-red-500 transition-colors" onclick="this.closest('.event-card').remove()">삭제</button>
                        </div>
                    </div>

                    <div class="event-card group flex items-center justify-between p-6 rounded-3xl glass-card border border-black/5 dark:border-white/10 shadow-lg opacity-80">
                        <div class="flex items-center gap-6">
                            <div class="flex flex-col items-center justify-center w-20 h-20 rounded-2xl bg-slate-100 dark:bg-white/5 border border-black/5 dark:border-white/5">
                                <span class="text-[10px] font-black text-slate-400 uppercase tracking-tighter">MAY</span>
                                <span class="text-3xl font-black text-slate-400">20</span>
                            </div>
                            <div>
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="px-2 py-0.5 rounded text-[10px] font-black bg-slate-200 dark:bg-white/10 text-slate-500 dark:text-gray-400 uppercase">Closed</span>
                                    <span class="text-xs font-bold text-slate-400">14:00 - 15:30</span>
                                </div>
                                <h3 class="text-xl font-black text-slate-400 tracking-tight line-through">네트워킹 파티 (Live)</h3>
                                <p class="text-xs text-slate-500 dark:text-gray-400 mt-1">온라인 (YouTube Live)</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-3">
                            <button class="p-3 rounded-xl bg-black/5 dark:bg-white/5 text-slate-300 cursor-not-allowed">수정</button>
                            <button class="p-3 rounded-xl bg-black/5 dark:bg-white/5 text-slate-400 hover:text-red-500 transition-colors" onclick="this.closest('.event-card').remove()">삭제</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
        <footer class="p-12 border-t border-black/5 dark:border-white/5 text-center text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">
            © 2026 World. Digital Excellence.
        </footer>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        function toggleAddForm() {
            const form = document.getElementById('add-form-container');
            const list = document.getElementById('event-list-container');
            const isHidden = form.classList.contains('hidden');
            
            if (isHidden) {
                form.classList.remove('hidden');
                list.classList.replace('lg:col-span-3', 'lg:col-span-2');
            } else {
                form.classList.add('hidden');
                list.classList.replace('lg:col-span-2', 'lg:col-span-3');
            }
        }

        function addEvent() {
            const title = document.getElementById('event-title').value;
            const date = document.getElementById('event-date').value;
            const time = document.getElementById('event-time').value;
            
            if(!title || !date) return alert('제목과 날짜를 입력해주세요.');

            const dateObj = new Date(date);
            const month = dateObj.toLocaleString('en-US', { month: 'short' }).toUpperCase();
            const day = dateObj.getDate();

            const newEvent = document.createElement('div');
            newEvent.className = 'event-card group flex items-center justify-between p-6 rounded-3xl glass-card border border-black/5 dark:border-white/10 shadow-lg animate-in';
            newEvent.innerHTML = `
                <div class="flex items-center gap-6">
                    <div class="flex flex-col items-center justify-center w-20 h-20 rounded-2xl bg-indigo-50 dark:bg-indigo-950/30 border border-indigo-100 dark:border-indigo-500/20">
                        <span class="text-[10px] font-black text-indigo-500 uppercase">${month}</span>
                        <span class="text-3xl font-black text-slate-900 dark:text-white">${day}</span>
                    </div>
                    <div>
                        <div class="flex items-center gap-2 mb-1">
                            <span class="px-2 py-0.5 rounded text-[10px] font-black bg-emerald-100 dark:bg-emerald-900/40 text-emerald-600 dark:text-emerald-400 uppercase">Upcoming</span>
                            <span class="text-xs font-bold text-slate-400">${time || '시간 미정'}</span>
                        </div>
                        <h3 class="text-xl font-black text-slate-900 dark:text-white tracking-tight">${title}</h3>
                        <p class="text-xs text-slate-500 dark:text-gray-400 mt-1">온라인 미팅</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <button class="p-3 rounded-xl bg-black/5 dark:bg-white/5 text-slate-400 hover:text-indigo-500 transition-colors">수정</button>
                    <button class="p-3 rounded-xl bg-black/5 dark:bg-white/5 text-slate-400 hover:text-red-500 transition-colors" onclick="this.closest('.event-card').remove()">삭제</button>
                </div>
            `;
            
            document.getElementById('event-list-container').prepend(newEvent);
            toggleAddForm();
            // Reset form
            document.getElementById('event-title').value = '';
        }
    </script>
</body>
</html>
