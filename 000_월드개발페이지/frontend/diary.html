<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>밋업 피드백 일기장 - WORLD</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .star { cursor: pointer; transition: all 0.2s; font-size: 1.5rem; color: #334155; }
        .star.active { color: #f59e0b; text-shadow: 0 0 10px rgba(245, 158, 11, 0.4); }
    </style>
</head>
<body class="antialiased overflow-x-hidden bg-bg-light dark:bg-bg-dark text-slate-900 dark:text-slate-100 transition-colors duration-300">
    <div class="full-bg">
        <div class="content-container min-h-screen flex flex-col">
            <!-- Header -->
            <header class="w-full bg-[#030509]/80 backdrop-blur-md border-b border-white/5 px-8 py-4 flex justify-between items-center transition-all duration-300 sticky top-0 z-50">
                <!-- Left Logo -->
                <div class="flex items-center space-x-3">
                    <a href="index.html" class="text-xl font-black tracking-tighter flex items-center gap-2 group">
                        <div class="w-6 h-6 rounded-full bg-gradient-to-tr from-cyan-400 via-indigo-500 to-purple-500 relative flex items-center justify-center shadow-lg group-hover:scale-110 transition duration-300">
                            <div class="absolute w-7.5 h-3 border border-white/60 rounded-full rotate-[-30deg]"></div>
                        </div>
                        <span class="text-white font-extrabold text-lg tracking-widest uppercase">WORLD</span>
                    </a>
                </div>

                <!-- Center GNB Tabs -->
                <nav class="hidden md:flex items-center space-x-8 text-sm font-bold text-slate-400">
                    <a href="index.html" class="hover:text-white transition duration-200">홈</a>
                    <a href="meetup-calendar.html" class="hover:text-white transition duration-200">밋업</a>
                    <a href="workspace/index.html?view=styler" class="hover:text-white transition duration-200">블로그/티스토리</a>
                    <a href="autohunter-download.html" class="hover:text-white transition duration-200">오토메이플</a>
                    <a href="#" id="nav-feedback" class="hover:text-white transition duration-200">피드백</a>
                </nav>

                <!-- Right Buttons -->
                <div class="flex items-center space-x-3 text-[11px] font-semibold">
                    <button onclick="saveAll()" class="px-4 py-1.5 rounded-full bg-indigo-600 hover:bg-indigo-500 text-white transition flex items-center gap-1.5 shadow-md active:scale-95">
                        <span>💾</span> 일기 전체 저장
                    </button>
                    <button class="open-auth px-4 py-1.5 rounded-full border border-white/10 bg-white/5 hover:bg-white/10 text-gray-200 hover:text-white transition flex items-center gap-1.5">
                        <span>🔑</span> 로그인 / 가입
                    </button>
                </div>
            </header>

        <main class="flex-grow p-8 max-w-5xl mx-auto w-full">
            <div class="flex justify-between items-end mb-12">
                <div>
                    <h1 class="text-5xl font-black mb-3 tracking-tighter uppercase">✍️ 피드백 일기</h1>
                    <p class="text-slate-500 font-medium">밋업의 잘한 점과 개선할 점을 별점과 함께 기록하세요.</p>
                </div>
                <button onclick="addEntry()" class="px-8 py-3.5 rounded-2xl bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-black text-sm transition active:scale-95 shadow-xl">+ 새 일기 쓰기</button>
            </div>

            <div id="diary-container" class="space-y-8">
                <!-- Diary entries generated by JS -->
            </div>
        </main>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        let diaryEntries = AppStorage.load('diary_entries') || [];

        function renderEntries() {
            const container = document.getElementById('diary-container');
            container.innerHTML = '';
            if (diaryEntries.length === 0) {
                container.innerHTML = `<div class="py-20 text-center glass-card rounded-[3rem] border border-white/5 text-slate-500">작성된 일기가 없습니다. 새 일기를 작성해 보세요.</div>`;
                return;
            }
            diaryEntries.forEach((entry, idx) => {
                const card = document.createElement('div');
                card.className = 'glass-card p-10 rounded-[3rem] border border-white/5 shadow-2xl relative group animate-in';
                card.innerHTML = `
                    <div class="flex flex-col md:flex-row gap-8">
                        <div class="md:w-1/4 border-r border-white/5">
                            <input type="date" value="${entry.date}" onchange="updateVal(${idx}, 'date', this.value)" class="bg-transparent border-none font-black text-2xl text-indigo-500 p-0 focus:ring-0 mb-4 w-full">
                            <div class="flex gap-1 mb-2">
                                ${[1,2,3,4,5].map(s => `<span class="star ${s <= (entry.rating||0) ? 'active' : ''}" onclick="updateRating(${idx}, ${s})">★</span>`).join('')}
                            </div>
                            <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Self Evaluation</p>
                        </div>
                        <div class="flex-grow space-y-6">
                            <input type="text" value="${entry.title}" onchange="updateVal(${idx}, 'title', this.value)" class="w-full bg-transparent border-none font-black text-3xl focus:ring-0 p-0" placeholder="일기 제목을 입력하세요...">
                            <div class="grid md:grid-cols-2 gap-8">
                                <div class="space-y-3">
                                    <h4 class="text-[10px] font-black text-emerald-400 uppercase tracking-[0.2em]">👍 WELL DONE</h4>
                                    <textarea onchange="updateVal(${idx}, 'good', this.value)" class="w-full bg-white/5 border border-white/5 rounded-2xl p-4 text-sm focus:outline-none focus:border-emerald-500/30 transition h-32 leading-relaxed" placeholder="오늘 잘했던 점...">${entry.good || ''}</textarea>
                                </div>
                                <div class="space-y-3">
                                    <h4 class="text-[10px] font-black text-red-400 uppercase tracking-[0.2em]">👎 NEEDS WORK</h4>
                                    <textarea onchange="updateVal(${idx}, 'bad', this.value)" class="w-full bg-white/5 border border-white/5 rounded-2xl p-4 text-sm focus:outline-none focus:border-red-500/30 transition h-32 leading-relaxed" placeholder="개선이 필요한 점...">${entry.bad || ''}</textarea>
                                </div>
                            </div>
                        </div>
                    </div>
                    <button onclick="deleteEntry(${idx})" class="absolute top-8 right-8 text-slate-600 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all">🗑️</button>
                `;
                container.appendChild(card);
            });
        }

        function addEntry() {
            diaryEntries.unshift({ id: Date.now(), date: new Date().toISOString().split('T')[0], title: '', rating: 3, good: '', bad: '' });
            renderEntries();
        }

        function updateVal(idx, key, val) {
            diaryEntries[idx][key] = val;
        }

        function updateRating(idx, rating) {
            diaryEntries[idx].rating = rating;
            renderEntries();
        }

        function deleteEntry(idx) {
            if(!confirm('삭제하시겠습니까?')) return;
            diaryEntries.splice(idx, 1);
            renderEntries();
        }

        function saveAll() {
            AppStorage.save('diary_entries', diaryEntries);
        }

        document.addEventListener('DOMContentLoaded', renderEntries);
    </script>
</body>
</html>
