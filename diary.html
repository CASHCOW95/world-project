<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>밋업 피드백 일기장 - WORLD AI</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .star-rating {
            display: flex;
            gap: 4px;
        }
        .star {
            cursor: pointer;
            font-size: 1.25rem;
            color: #475569;
            transition: color 0.2s;
        }
        .star.active {
            color: #f59e0b;
        }
    </style>
</head>
<body class="antialiased bg-bg-light dark:bg-bg-dark text-slate-900 dark:text-slate-100 transition-colors duration-300">
    <div class="min-h-screen flex flex-col">
        <!-- Header -->
        <header class="w-full bg-white/60 dark:bg-[#030509]/30 backdrop-blur-md border-b border-black/5 dark:border-white/5 px-8 py-3.5 flex justify-between items-center sticky top-0 z-50">
            <a href="index.html" class="flex items-center space-x-3">
                <div class="text-xl font-black tracking-tighter flex items-center gap-2">
                    <div class="w-5 h-5 rounded-full bg-gradient-to-tr from-cyan-400 via-indigo-500 to-purple-500 relative flex items-center justify-center shadow-inner">
                        <div class="absolute w-6.5 h-2.5 border border-white/50 rounded-full rotate-[-30deg]"></div>
                    </div>
                    <span class="text-slate-900 dark:text-white font-extrabold text-lg tracking-wide uppercase">WORLD AI</span>
                </div>
            </a>
            <div class="flex items-center space-x-4">
                <button onclick="saveAll()" class="px-6 py-2 rounded-full bg-indigo-600 text-white font-black text-[11px] shadow-lg active:scale-95 transition-all">💾 일기 저장</button>
                <button id="theme-toggle" class="p-2 rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors">
                    <span id="theme-icon">🌙</span>
                </button>
                <a href="index.html" class="px-4 py-1.5 rounded-full border border-black/10 dark:border-white/10 text-slate-700 dark:text-gray-200 text-xs font-bold">HOME</a>
            </div>
        </header>

        <main class="flex-grow p-8 max-w-5xl mx-auto w-full">
            <div class="mb-12 flex justify-between items-end">
                <div>
                    <h1 class="text-5xl font-black mb-3 tracking-tighter">✍️ 밋업 피드백 일기</h1>
                    <p class="text-slate-500 font-medium">잘한 점과 부족했던 점을 기록하며 함께 성장하세요.</p>
                </div>
                <button onclick="addEntry()" class="px-8 py-3.5 rounded-2xl bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-black text-sm transition active:scale-95 shadow-xl">+ 새 일기 쓰기</button>
            </div>

            <div id="diary-container" class="space-y-8">
                <!-- Diary entries here -->
            </div>
        </main>

        <footer class="p-12 text-center text-[10px] font-black text-slate-500 uppercase tracking-widest">
            © 2026 World AI. Reflection & Growth.
        </footer>
    </div>

    <script src="js/main.js"></script>
    <script>
        let diaryEntries = AppStorage.load('diary_entries') || [
            { id: 1, date: '2026-05-20', title: '첫 밋업 회고', rating: 4, good: '준비한 자료를 명확하게 설명함.', bad: '시간 배분에 실패하여 Q&A 시간이 부족했음.' }
        ];

        function renderEntries() {
            const container = document.getElementById('diary-container');
            container.innerHTML = '';

            if (diaryEntries.length === 0) {
                container.innerHTML = `<div class="py-20 text-center text-slate-500">작성된 일기가 없습니다.</div>`;
                return;
            }

            diaryEntries.forEach((entry, idx) => {
                const card = document.createElement('div');
                card.className = 'glass-card p-10 rounded-[3rem] border border-black/5 dark:border-white/10 shadow-2xl relative group';
                card.innerHTML = `
                    <div class="flex flex-col md:flex-row gap-8">
                        <div class="md:w-1/4">
                            <input type="date" value="${entry.date}" onchange="updateEntry(${idx}, 'date', this.value)" class="bg-transparent border-none font-black text-2xl text-indigo-500 p-0 focus:ring-0 mb-4">
                            <div class="star-rating" id="rating-${entry.id}">
                                ${[1,2,3,4,5].map(s => `<span class="star ${s <= entry.rating ? 'active' : ''}" onclick="updateRating(${idx}, ${s})">★</span>`).join('')}
                            </div>
                        </div>
                        <div class="flex-grow space-y-6">
                            <input type="text" value="${entry.title}" onchange="updateEntry(${idx}, 'title', this.value)" class="w-full bg-transparent border-none font-black text-3xl focus:ring-0 p-0" placeholder="제목을 입력하세요">
                            <div class="grid md:grid-cols-2 gap-8">
                                <div class="space-y-3">
                                    <h4 class="text-[11px] font-black text-emerald-500 uppercase tracking-widest">👍 잘한 점</h4>
                                    <textarea onchange="updateEntry(${idx}, 'good', this.value)" class="w-full bg-black/5 dark:bg-white/5 border border-white/5 rounded-2xl p-4 text-sm focus:outline-none focus:border-emerald-500/50 transition h-32 leading-relaxed">${entry.good || ''}</textarea>
                                </div>
                                <div class="space-y-3">
                                    <h4 class="text-[11px] font-black text-red-400 uppercase tracking-widest">👎 부족했던 점</h4>
                                    <textarea onchange="updateEntry(${idx}, 'bad', this.value)" class="w-full bg-black/5 dark:bg-white/5 border border-white/5 rounded-2xl p-4 text-sm focus:outline-none focus:border-red-500/50 transition h-32 leading-relaxed">${entry.bad || ''}</textarea>
                                </div>
                            </div>
                        </div>
                    </div>
                    <button onclick="deleteEntry(${idx})" class="absolute top-8 right-8 text-slate-400 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity">🗑️ 삭제</button>
                `;
                container.appendChild(card);
            });
        }

        function addEntry() {
            diaryEntries.unshift({ id: Date.now(), date: new Date().toISOString().split('T')[0], title: '신규 일기', rating: 3, good: '', bad: '' });
            renderEntries();
        }

        function updateEntry(idx, key, val) {
            diaryEntries[idx][key] = val;
        }

        function updateRating(idx, rating) {
            diaryEntries[idx].rating = rating;
            renderEntries();
        }

        function deleteEntry(idx) {
            if(!confirm('삭제하시겠습니까?')) return;
            diaryEntries.splice(idx, 1);
            renderEntries();
        }

        function saveAll() {
            AppStorage.save('diary_entries', diaryEntries);
        }

        document.addEventListener('DOMContentLoaded', renderEntries);
    </script>
</body>
</html>
