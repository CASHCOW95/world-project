<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>온/오프라인 밋업 통합관리 - WORLD</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="antialiased overflow-x-hidden bg-bg-light dark:bg-bg-dark text-slate-900 dark:text-slate-100 transition-colors duration-300">
    <div class="full-bg">
        <div class="content-container min-h-screen flex flex-col">
            <!-- Header -->
        <header class="w-full bg-[#030509]/80 backdrop-blur-md border-b border-white/5 px-8 py-4 flex justify-between items-center transition-all duration-300 sticky top-0 z-50">
            <!-- Left Logo -->
            <div class="flex items-center space-x-3">
                <a href="index.html" class="text-xl font-black tracking-tighter flex items-center gap-2 group">
                    <div class="w-6 h-6 rounded-full bg-gradient-to-tr from-cyan-400 via-indigo-500 to-purple-500 relative flex items-center justify-center shadow-lg group-hover:scale-110 transition duration-300">
                        <div class="absolute w-7.5 h-3 border border-white/60 rounded-full rotate-[-30deg]"></div>
                    </div>
                    <span class="text-white font-extrabold text-lg tracking-widest uppercase">WORLD</span>
                </a>
            </div>

            <!-- Center GNB Tabs -->
            <nav class="hidden md:flex items-center space-x-8 text-sm font-bold text-slate-400">
                <a href="index.html" class="hover:text-white transition duration-200">홈</a>
                <a href="meetup-calendar.html" class="hover:text-white transition duration-200 active-tab">밋업</a>
                <a href="workspace/index.html?view=styler" class="hover:text-white transition duration-200">블로그/티스토리</a>
                <a href="autohunter-download.html" class="hover:text-white transition duration-200">오토메이플</a>
                <a href="#" id="nav-feedback" class="hover:text-white transition duration-200">피드백</a>
            </nav>

            <!-- Right Buttons -->
            <div class="flex items-center space-x-3 text-[11px] font-semibold">
                <button onclick="saveAll()" class="px-4 py-1.5 rounded-full bg-indigo-600 hover:bg-indigo-500 text-white transition flex items-center gap-1.5 shadow-md active:scale-95">
                    <span>💾</span> 변경사항 저장
                </button>
                <button class="open-auth px-4 py-1.5 rounded-full border border-white/10 bg-white/5 hover:bg-white/10 text-gray-200 hover:text-white transition flex items-center gap-1.5">
                    <span>🔑</span> 로그인 / 가입
                </button>
            </div>
        </header>

        <main class="flex-grow p-8 max-w-6xl mx-auto w-full">
            <div class="flex flex-col md:flex-row justify-between items-end mb-12 gap-6">
                <div>
                    <h1 class="text-5xl font-black text-slate-900 dark:text-white mb-3 tracking-tighter">🗓️ 온/오프라인 밋업</h1>
                    <p class="text-slate-500 dark:text-gray-400 font-medium italic">구글 캘린더 연동 타임라인과 사용자 커스텀 일정을 함께 관리하세요.</p>
                </div>
                <div class="flex gap-4">
                    <button onclick="toggleAddForm()" class="px-8 py-3.5 rounded-2xl bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-black text-sm transition active:scale-95 shadow-xl">+ 일정 추가</button>
                </div>
            </div>

            <div class="grid lg:grid-cols-3 gap-10">
                <!-- Left: Custom CRUD List -->
                <div class="lg:col-span-2 space-y-6">
                    <div id="add-form" class="hidden animate-in">
                        <div class="glass-card p-8 rounded-[2.5rem] border border-indigo-500/20 shadow-2xl mb-8">
                            <h3 class="text-xl font-black mb-6">신규 일정 등록</h3>
                            <div class="grid grid-cols-2 gap-4">
                                <div class="col-span-2">
                                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-1.5">제목</label>
                                    <input type="text" id="ev-title" class="w-full px-4 py-3 rounded-xl bg-black/5 dark:bg-white/5 border border-white/10 text-sm focus:border-indigo-500">
                                </div>
                                <div>
                                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-1.5">날짜</label>
                                    <input type="date" id="ev-date" class="w-full px-4 py-3 rounded-xl bg-black/5 dark:bg-white/5 border border-white/10 text-xs">
                                </div>
                                <div>
                                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-1.5">시간</label>
                                    <input type="time" id="ev-time" class="w-full px-4 py-3 rounded-xl bg-black/5 dark:bg-white/5 border border-white/10 text-xs">
                                </div>
                            </div>
                            <button onclick="addEvent()" class="w-full py-4 mt-6 rounded-2xl bg-indigo-600 text-white font-black text-sm shadow-xl hover:opacity-90">일정 저장</button>
                        </div>
                    </div>

                    <div id="event-list" class="space-y-4">
                        <!-- Events here -->
                    </div>
                </div>

                <!-- Right: Google Calendar Embed -->
                <div class="lg:col-span-1">
                    <div class="sticky top-24 space-y-6">
                        <h3 class="text-xs font-black text-slate-500 uppercase tracking-widest flex items-center gap-2">
                            <span class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></span>
                            Google Calendar Live
                        </h3>
                        <div class="rounded-3xl overflow-hidden border border-black/5 dark:border-white/10 shadow-2xl aspect-[3/4] bg-white">
                            <iframe src="https://calendar.google.com/calendar/embed?src=ko.south_korea%23holiday%40group.v.calendar.google.com&ctz=Asia%2FSeoul" style="border: 0" width="100%" height="100%" frameborder="0" scrolling="no"></iframe>
                        </div>
                        <p class="text-[10px] text-slate-500 text-center px-4 leading-relaxed">위 캘린더는 대한민국 공휴일 기준입니다. 자신의 캘린더를 연동하려면 설정에서 소스 ID를 변경하세요.</p>
                    </div>
                </div>
            </div>
        </main>

        <footer class="p-12 border-t border-black/5 dark:border-white/5 text-center text-[10px] font-black text-slate-400 uppercase tracking-[0.4em]">
            © 2026 World. Unified Management.
        </footer>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        let events = AppStorage.load('meetup_events') || [];

        function renderEvents() {
            const container = document.getElementById('event-list');
            container.innerHTML = '';
            if (events.length === 0) {
                container.innerHTML = '<div class="p-20 text-center glass-card rounded-[2.5rem] border border-white/5 text-slate-500">일정이 없습니다.</div>';
                return;
            }
            const sorted = [...events].sort((a, b) => new Date(a.date) - new Date(b.date));
            sorted.forEach(ev => {
                const div = document.createElement('div');
                div.className = 'glass-card p-6 rounded-3xl border border-white/5 flex justify-between items-center group';
                div.innerHTML = `
                    <div class="flex items-center gap-6">
                        <div class="w-16 h-16 rounded-2xl bg-indigo-600/10 flex flex-col items-center justify-center border border-indigo-500/20">
                            <span class="text-[9px] font-black text-indigo-500 uppercase">${new Date(ev.date).toLocaleString('en-US',{month:'short'})}</span>
                            <span class="text-2xl font-black">${new Date(ev.date).getDate()}</span>
                        </div>
                        <div>
                            <h4 class="font-black text-lg">${ev.title}</h4>
                            <p class="text-xs text-slate-500 font-bold">⏰ ${ev.time || '시간 미정'}</p>
                        </div>
                    </div>
                    <button onclick="deleteEvent(${ev.id})" class="p-3 rounded-xl bg-red-500/10 text-red-500 opacity-0 group-hover:opacity-100 transition-opacity">🗑️</button>
                `;
                container.appendChild(div);
            });
        }

        function toggleAddForm() { document.getElementById('add-form').classList.toggle('hidden'); }

        function addEvent() {
            const title = document.getElementById('ev-title').value;
            const date = document.getElementById('ev-date').value;
            const time = document.getElementById('ev-time').value;
            if(!title || !date) return alert('제목과 날짜를 입력하세요.');
            events.push({ id: Date.now(), title, date, time });
            renderEvents();
            toggleAddForm();
        }

        function deleteEvent(id) {
            events = events.filter(e => e.id !== id);
            renderEvents();
        }

        function saveAll() { AppStorage.save('meetup_events', events); }

        document.addEventListener('DOMContentLoaded', renderEvents);
    </script>
</body>
</html>
