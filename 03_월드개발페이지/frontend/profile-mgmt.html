<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>밋업프로필 관리 - WORLD</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- SheetJS for Excel Parsing -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .editable-cell:focus {
            background: rgba(99, 102, 241, 0.1);
            outline: none;
            box-shadow: inset 0 0 0 2px #6366f1;
        }
    </style>
</head>
<body class="antialiased overflow-x-hidden bg-bg-light dark:bg-bg-dark text-slate-900 dark:text-slate-100 transition-colors duration-300">
    <div class="full-bg">
        <div class="content-container min-h-screen flex flex-col">
            <!-- Header -->
            <header class="w-full bg-[#030509]/80 backdrop-blur-md border-b border-white/5 px-8 py-4 flex justify-between items-center transition-all duration-300 sticky top-0 z-50">
                <!-- Left Logo -->
                <div class="flex items-center space-x-3">
                    <a href="index.html" class="text-xl font-black tracking-tighter flex items-center gap-2 group">
                        <div class="w-6 h-6 rounded-full bg-gradient-to-tr from-cyan-400 via-indigo-500 to-purple-500 relative flex items-center justify-center shadow-lg group-hover:scale-110 transition duration-300">
                            <div class="absolute w-7.5 h-3 border border-white/60 rounded-full rotate-[-30deg]"></div>
                        </div>
                        <span class="text-white font-extrabold text-lg tracking-widest uppercase">WORLD</span>
                    </a>
                </div>

                <!-- Center GNB Tabs -->
                <nav class="hidden md:flex items-center space-x-8 text-sm font-bold text-slate-400">
                    <a href="index.html" class="hover:text-white transition duration-200">홈</a>
                    <a href="meetup-calendar.html" class="hover:text-white transition duration-200">밋업</a>
                    <a href="workspace/index.html?view=styler" class="hover:text-white transition duration-200">블로그/티스토리</a>
                    <a href="autohunter-download.html" class="hover:text-white transition duration-200">오토메이플</a>
                    <a href="#" id="nav-feedback" class="hover:text-white transition duration-200">피드백</a>
                </nav>

                <!-- Right Buttons -->
                <div class="flex items-center space-x-3 text-[11px] font-semibold">
                    <button class="open-auth px-4 py-1.5 rounded-full border border-white/10 bg-white/5 hover:bg-white/10 text-gray-200 hover:text-white transition flex items-center gap-1.5">
                        <span>🔑</span> 로그인 / 가입
                    </button>
                    <a href="openform-download.html" class="px-4 py-1.5 rounded-full border border-indigo-500/30 bg-indigo-500/10 hover:bg-indigo-500/20 text-indigo-300 hover:text-indigo-200 transition flex items-center gap-1.5">
                        <span>⏱️</span> 패치노트
                    </a>
                </div>
            </header>

        <main class="flex-grow p-8 max-w-7xl mx-auto w-full">
            <div class="flex flex-col md:flex-row justify-between items-end mb-12 gap-6">
                <div>
                    <h1 class="text-5xl font-black text-slate-900 dark:text-white mb-3 tracking-tighter">📊 밋업프로필 관리</h1>
                    <p class="text-slate-500 dark:text-gray-400 font-medium">엑셀 데이터를 업로드하고 웹에서 직접 수정 및 저장하세요.</p>
                </div>
                <div class="flex gap-3">
                    <button onclick="document.getElementById('excel-upload').click()" class="px-6 py-3.5 rounded-2xl bg-indigo-600 hover:bg-indigo-500 text-white font-black text-sm transition shadow-lg flex items-center gap-2">
                        <span>📂</span> 파일 불러오기
                    </button>
                    <button onclick="exportExcel()" id="export-btn" class="px-6 py-3.5 rounded-2xl bg-emerald-600 hover:bg-emerald-500 text-white font-black text-sm transition shadow-lg hidden">
                        💾 엑셀로 저장
                    </button>
                    <input type="file" id="excel-upload" class="hidden" accept=".xlsx, .xls">
                </div>
            </div>

            <div class="glass-card rounded-[2.5rem] border border-black/5 dark:border-white/10 shadow-2xl p-1 min-h-[500px] overflow-hidden relative">
                <!-- Empty State -->
                <div id="upload-placeholder" class="absolute inset-0 flex flex-col items-center justify-center text-center p-12 transition-all duration-500">
                    <div class="w-32 h-32 rounded-3xl bg-indigo-50 dark:bg-indigo-950/20 border border-indigo-100 dark:border-indigo-500/10 flex items-center justify-center text-6xl mb-8 animate-bounce shadow-inner">📄</div>
                    <h3 class="text-2xl font-black mb-3">데이터가 없습니다</h3>
                    <p class="text-slate-500 dark:text-gray-400 max-w-sm leading-relaxed">관리하실 엑셀 파일을 업로드해 주세요. <br>파일 내 모든 데이터가 즉시 편집 가능한 테이블로 변환됩니다.</p>
                </div>

                <!-- Editable Table -->
                <div id="excel-preview" class="hidden w-full h-full overflow-auto max-h-[70vh]">
                    <table class="w-full text-left text-sm border-collapse">
                        <thead id="table-head" class="sticky top-0 bg-white/90 dark:bg-slate-900/90 backdrop-blur-md z-10 shadow-sm">
                            <!-- Headers will be injected here -->
                        </thead>
                        <tbody id="table-body" class="divide-y divide-black/5 dark:divide-white/5">
                            <!-- Data will be injected here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
        </div>
        <footer class="p-10 border-t border-black/5 dark:border-white/5 text-center text-[10px] font-black text-slate-400 uppercase tracking-[0.3em]">
            © 2026 World. Data Intelligence Hub.
        </footer>
    </div>

    <script src="js/main.js"></script>
    <script>
        let currentData = [];

        document.getElementById('excel-upload').addEventListener('change', handleFileUpload);

        function handleFileUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const jsonData = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });

                renderTable(jsonData);
            };
            reader.readAsArrayBuffer(file);
        }

        function renderTable(data) {
            if (!data || data.length === 0) return;
            currentData = data;

            const head = document.getElementById('table-head');
            const body = document.getElementById('table-body');
            const placeholder = document.getElementById('upload-placeholder');
            const preview = document.getElementById('excel-preview');
            const exportBtn = document.getElementById('export-btn');

            placeholder.classList.add('opacity-0', 'pointer-events-none');
            setTimeout(() => {
                placeholder.classList.add('hidden');
                preview.classList.remove('hidden');
                exportBtn.classList.remove('hidden');
            }, 500);

            // Headers
            const headers = data[0];
            head.innerHTML = `
                <tr>
                    ${headers.map(h => `<th class="px-6 py-5 font-black text-slate-400 uppercase tracking-widest text-[11px] border-b border-black/5 dark:border-white/10">${h || ''}</th>`).join('')}
                    <th class="px-6 py-5 font-black text-slate-400 uppercase tracking-widest text-[11px] border-b border-black/5 dark:border-white/10">Actions</th>
                </tr>
            `;

            // Rows
            body.innerHTML = data.slice(1).map((row, rowIndex) => `
                <tr class="hover:bg-black/5 dark:hover:bg-white/5 transition-colors group">
                    ${headers.map((_, colIndex) => `
                        <td class="px-6 py-4 border-b border-black/5 dark:border-white/10">
                            <div class="editable-cell px-2 py-1 rounded-lg transition-all" contenteditable="true" onblur="updateData(${rowIndex + 1}, ${colIndex}, this.innerText)">
                                ${row[colIndex] || ''}
                            </div>
                        </td>
                    `).join('')}
                    <td class="px-6 py-4 border-b border-black/5 dark:border-white/10">
                        <button onclick="deleteRow(${rowIndex + 1})" class="text-red-400 hover:text-red-500 font-bold text-xs opacity-0 group-hover:opacity-100 transition-opacity">삭제</button>
                    </td>
                </tr>
            `).join('');
        }

        function updateData(r, c, val) {
            currentData[r][c] = val;
        }

        function deleteRow(index) {
            currentData.splice(index, 1);
            renderTable(currentData);
        }

        function exportExcel() {
            const worksheet = XLSX.utils.aoa_to_sheet(currentData);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Profiles");
            XLSX.writeFile(workbook, "Updated_Meetup_Profiles.xlsx");
        }
    </script>
</body>
</html>
