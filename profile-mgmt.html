<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>밋업프로필 관리 - WORLD AI</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="antialiased bg-bg-light dark:bg-bg-dark text-slate-900 dark:text-slate-100 transition-colors duration-300">
    <div class="min-h-screen flex flex-col">
        <!-- Header -->
        <header class="w-full bg-white/60 dark:bg-[#030509]/30 backdrop-blur-md border-b border-black/5 dark:border-white/5 px-8 py-3.5 flex justify-between items-center sticky top-0 z-50">
            <a href="index.html" class="flex items-center space-x-3">
                <div class="text-xl font-black tracking-tighter flex items-center gap-2">
                    <div class="w-5 h-5 rounded-full bg-gradient-to-tr from-cyan-400 via-indigo-500 to-purple-500 relative flex items-center justify-center shadow-inner">
                        <div class="absolute w-6.5 h-2.5 border border-white/50 rounded-full rotate-[-30deg]"></div>
                    </div>
                    <span class="text-slate-900 dark:text-white font-extrabold text-lg tracking-wide">WORLD AI</span>
                </div>
            </a>
            <div class="flex items-center space-x-3">
                <button id="theme-toggle" class="p-2 rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors">
                    <span id="theme-icon">🌙</span>
                </button>
                <a href="index.html" class="px-4 py-1.5 rounded-full border border-black/10 dark:border-white/10 bg-black/5 dark:bg-white/5 hover:bg-black/10 dark:hover:bg-white/10 text-slate-700 dark:text-gray-200 text-xs transition">홈으로 돌아가기</a>
            </div>
        </header>

        <main class="flex-grow p-8 max-w-6xl mx-auto w-full">
            <div class="mb-8 flex justify-between items-end">
                <div>
                    <h1 class="text-4xl font-black text-slate-900 dark:text-white mb-2">📊 밋업프로필 관리</h1>
                    <p class="text-slate-600 dark:text-gray-400">엑셀 파일을 업로드하여 멤버 프로필을 대량으로 수정하고 관리하세요.</p>
                </div>
                <button class="px-6 py-2.5 rounded-xl bg-indigo-600 hover:bg-indigo-500 text-white font-bold text-sm transition shadow-lg" onclick="document.getElementById('excel-upload').click()">
                    엑셀 파일 업로드
                </button>
                <input type="file" id="excel-upload" class="hidden" accept=".xlsx, .xls">
            </div>

            <div class="glass-card rounded-3xl border border-black/5 dark:border-white/10 shadow-2xl p-8 min-h-[400px]">
                <div id="upload-placeholder" class="h-full flex flex-col items-center justify-center text-center py-20">
                    <div class="w-20 h-20 rounded-2xl bg-black/5 dark:bg-white/5 flex items-center justify-center text-4xl mb-6">📂</div>
                    <h3 class="text-xl font-bold mb-2">업로드된 파일이 없습니다</h3>
                    <p class="text-slate-500 text-sm mb-8">관리할 프로필 데이터가 담긴 엑셀 파일을 업로드해 주세요.</p>
                </div>

                <div id="excel-preview" class="hidden">
                    <div class="overflow-x-auto rounded-2xl border border-black/5 dark:border-white/10">
                        <table class="w-full text-left text-sm">
                            <thead class="bg-slate-50 dark:bg-white/5 text-slate-500 uppercase font-bold">
                                <tr>
                                    <th class="px-6 py-4">이름</th>
                                    <th class="px-6 py-4">이메일</th>
                                    <th class="px-6 py-4">역할</th>
                                    <th class="px-6 py-4">상태</th>
                                    <th class="px-6 py-4">마지막 접속</th>
                                    <th class="px-6 py-4">작업</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-black/5 dark:divide-white/5">
                                <!-- Sample Data -->
                                <tr class="hover:bg-black/5 dark:hover:bg-white/5 transition-colors">
                                    <td class="px-6 py-4 font-medium">홍길동</td>
                                    <td class="px-6 py-4">hong@example.com</td>
                                    <td class="px-6 py-4"><span class="px-2 py-1 rounded-md bg-indigo-100 dark:bg-indigo-900/40 text-indigo-600 dark:text-indigo-400 text-[10px] font-bold">ADMIN</span></td>
                                    <td class="px-6 py-4"><span class="flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-emerald-500"></span>활성</span></td>
                                    <td class="px-6 py-4 text-slate-400">2026-05-20</td>
                                    <td class="px-6 py-4">
                                        <button class="text-indigo-600 hover:underline">수정</button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>

        <footer class="p-8 border-t border-black/5 dark:border-white/5 text-center text-xs text-slate-500">
            © 2026 World AI. All rights reserved.
        </footer>
    </div>
    <script src="js/main.js"></script>
    <script>
        document.getElementById('excel-upload').addEventListener('change', (e) => {
            if(e.target.files.length > 0) {
                document.getElementById('upload-placeholder').classList.add('hidden');
                document.getElementById('excel-preview').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
