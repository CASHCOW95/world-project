<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기프티콘 관리 - WORLD AI</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="antialiased bg-bg-light dark:bg-bg-dark text-slate-900 dark:text-slate-100 transition-colors duration-300">
    <div class="min-h-screen flex flex-col">
        <!-- Header -->
        <header class="w-full bg-white/60 dark:bg-[#030509]/30 backdrop-blur-md border-b border-black/5 dark:border-white/5 px-8 py-3.5 flex justify-between items-center sticky top-0 z-50">
            <a href="index.html" class="flex items-center space-x-3">
                <div class="text-xl font-black tracking-tighter flex items-center gap-2">
                    <div class="w-5 h-5 rounded-full bg-gradient-to-tr from-cyan-400 via-indigo-500 to-purple-500 relative flex items-center justify-center shadow-inner">
                        <div class="absolute w-6.5 h-2.5 border border-white/50 rounded-full rotate-[-30deg]"></div>
                    </div>
                    <span class="text-slate-900 dark:text-white font-extrabold text-lg tracking-wide">WORLD AI</span>
                </div>
            </a>
            <div class="flex items-center space-x-3">
                <button id="theme-toggle" class="p-2 rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors">
                    <span id="theme-icon">🌙</span>
                </button>
                <a href="index.html" class="px-4 py-1.5 rounded-full border border-black/10 dark:border-white/10 bg-black/5 dark:bg-white/5 hover:bg-black/10 dark:hover:bg-white/10 text-slate-700 dark:text-gray-200 text-xs transition">홈으로 돌아가기</a>
            </div>
        </header>

        <main class="flex-grow p-8 max-w-6xl mx-auto w-full">
            <div class="mb-8 flex justify-between items-end">
                <div>
                    <h1 class="text-4xl font-black text-slate-900 dark:text-white mb-2">🎁 기프티콘 관리</h1>
                    <p class="text-slate-600 dark:text-gray-400">보관 중인 기프티콘 이미지를 업로드하고 체계적으로 관리하세요.</p>
                </div>
                <button class="px-6 py-2.5 rounded-xl bg-amber-600 hover:bg-amber-500 text-white font-bold text-sm transition shadow-lg" onclick="document.getElementById('gifticon-upload').click()">
                    이미지 업로드
                </button>
                <input type="file" id="gifticon-upload" class="hidden" accept="image/*" multiple>
            </div>

            <div class="glass-card rounded-3xl border border-black/5 dark:border-white/10 shadow-2xl p-8 min-h-[400px]">
                <div id="gifticon-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                    <!-- Placeholder -->
                    <div id="upload-placeholder" class="col-span-full py-20 text-center">
                        <div class="text-6xl mb-4 text-slate-300 dark:text-white/10">🖼️</div>
                        <h3 class="text-xl font-bold mb-2">등록된 기프티콘이 없습니다</h3>
                        <p class="text-slate-500 text-sm">이미지 업로드 버튼을 눌러 기프티콘을 추가해 주세요.</p>
                    </div>
                </div>
            </div>
        </main>

        <footer class="p-8 border-t border-black/5 dark:border-white/5 text-center text-xs text-slate-500">
            © 2026 World AI. All rights reserved.
        </footer>
    </div>
    <script src="js/main.js"></script>
    <script>
        const gifticonUpload = document.getElementById('gifticon-upload');
        const grid = document.getElementById('gifticon-grid');
        const placeholder = document.getElementById('upload-placeholder');

        gifticonUpload.addEventListener('change', (e) => {
            const files = e.target.files;
            if (files.length > 0) {
                if(placeholder) placeholder.classList.add('hidden');
                
                Array.from(files).forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const div = document.createElement('div');
                        div.className = 'group relative aspect-[3/4] rounded-2xl overflow-hidden border border-black/5 dark:border-white/10 bg-black/5 dark:bg-white/5 shadow-md hover:shadow-2xl transition-all hover:-translate-y-1';
                        div.innerHTML = `
                            <img src="${event.target.result}" class="w-full h-full object-cover">
                            <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-2">
                                <button class="p-2 rounded-full bg-white/20 backdrop-blur-md text-white hover:bg-white/40 transition">🔍</button>
                                <button class="p-2 rounded-full bg-red-500/80 text-white hover:bg-red-600 transition" onclick="this.closest('.group').remove()">🗑️</button>
                            </div>
                            <div class="absolute bottom-0 left-0 right-0 p-3 bg-gradient-to-t from-black/80 to-transparent">
                                <p class="text-white text-[10px] font-bold truncate">${file.name}</p>
                            </div>
                        `;
                        grid.appendChild(div);
                    };
                    reader.readAsDataURL(file);
                });
            }
        });
    </script>
</body>
</html>
