<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>온/오프라인 밋업 통합관리 - WORLD AI</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="antialiased bg-bg-light dark:bg-bg-dark text-slate-900 dark:text-slate-100 transition-colors duration-300">
    <div class="min-h-screen flex flex-col">
        <!-- Header -->
        <header class="w-full bg-white/60 dark:bg-[#030509]/30 backdrop-blur-md border-b border-black/5 dark:border-white/5 px-8 py-3.5 flex justify-between items-center sticky top-0 z-50">
            <a href="index.html" class="flex items-center space-x-3">
                <div class="text-xl font-black tracking-tighter flex items-center gap-2">
                    <div class="w-5 h-5 rounded-full bg-gradient-to-tr from-cyan-400 via-indigo-500 to-purple-500 relative flex items-center justify-center shadow-inner">
                        <div class="absolute w-6.5 h-2.5 border border-white/50 rounded-full rotate-[-30deg]"></div>
                    </div>
                    <span class="text-slate-900 dark:text-white font-extrabold text-lg tracking-wide uppercase">WORLD AI</span>
                </div>
            </a>
            <div class="flex items-center space-x-4">
                <button onclick="saveAll()" class="px-6 py-2 rounded-full bg-indigo-600 text-white font-black text-[11px] shadow-lg active:scale-95 transition-all">💾 전체 일정 저장</button>
                <button id="theme-toggle" class="p-2 rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors">
                    <span id="theme-icon">🌙</span>
                </button>
                <a href="index.html" class="px-4 py-1.5 rounded-full border border-black/10 dark:border-white/10 text-slate-700 dark:text-gray-200 text-xs font-bold">HOME</a>
            </div>
        </header>

        <main class="flex-grow p-8 max-w-6xl mx-auto w-full">
            <div class="mb-12">
                <h1 class="text-5xl font-black mb-3 tracking-tighter">🗓️ 온/오프라인 밋업</h1>
                <p class="text-slate-500 font-medium italic">구글 캘린더와 통합된 완벽한 일정 관리 솔루션입니다.</p>
            </div>

            <!-- Google Calendar Section -->
            <div class="glass-card rounded-[3rem] overflow-hidden border border-black/5 dark:border-white/10 shadow-2xl mb-12 h-[500px]">
                <iframe src="https://calendar.google.com/calendar/embed?src=ko.south_korea%23holiday%40group.v.calendar.google.com&ctz=Asia%2FSeoul" style="border: 0" width="100%" height="100%" frameborder="0" scrolling="no"></iframe>
            </div>

            <div class="grid lg:grid-cols-4 gap-8">
                <!-- Sidebar Form (Simplified & Enhanced) -->
                <div class="lg:col-span-1">
                    <div class="glass-card p-8 rounded-[2.5rem] border border-black/5 dark:border-white/10 shadow-2xl sticky top-24">
                        <h3 class="text-xl font-black mb-6 flex items-center gap-2">
                            <span class="w-2 h-6 bg-indigo-500 rounded-full"></span>
                            빠른 일정 추가
                        </h3>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">제목</label>
                                <input type="text" id="ev-title" class="w-full px-4 py-3 rounded-xl bg-black/5 dark:bg-white/5 border border-black/10 dark:border-white/10 text-sm focus:border-indigo-500 focus:outline-none" placeholder="밋업 제목">
                            </div>
                            <div class="grid grid-cols-2 gap-2">
                                <input type="date" id="ev-date" class="w-full px-3 py-3 rounded-xl bg-black/5 dark:bg-white/5 border border-black/10 dark:border-white/10 text-xs focus:border-indigo-500 focus:outline-none">
                                <input type="time" id="ev-time" class="w-full px-3 py-3 rounded-xl bg-black/5 dark:bg-white/5 border border-black/10 dark:border-white/10 text-xs focus:border-indigo-500 focus:outline-none">
                            </div>
                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">유형</label>
                                <select id="ev-type" class="w-full px-4 py-3 rounded-xl bg-black/5 dark:bg-white/5 border border-black/10 dark:border-white/10 text-sm focus:border-indigo-500 focus:outline-none">
                                    <option value="online">🌐 온라인</option>
                                    <option value="offline">📍 오프라인</option>
                                </select>
                            </div>
                            <button onclick="addEvent()" class="w-full py-4 mt-2 rounded-2xl bg-indigo-600 text-white font-black text-sm transition hover:opacity-90 active:scale-95 shadow-xl">등록하기</button>
                        </div>
                    </div>
                </div>

                <!-- Timeline List (Improved readability) -->
                <div id="event-list" class="lg:col-span-3 space-y-4">
                    <!-- Events -->
                </div>
            </div>
        </main>

        <footer class="p-12 text-center text-[10px] font-black text-slate-500 uppercase tracking-[0.4em]">
            © 2026 World AI. Unified Management.
        </footer>
    </div>

    <script src="js/main.js"></script>
    <script>
        let events = AppStorage.load('meetup_events') || [];

        function renderEvents() {
            const container = document.getElementById('event-list');
            container.innerHTML = '';

            if (events.length === 0) {
                container.innerHTML = `<div class="py-20 text-center text-slate-500">등록된 상세 일정이 없습니다.</div>`;
                return;
            }

            const sorted = [...events].sort((a, b) => new Date(a.date) - new Date(b.date));

            sorted.forEach((ev, idx) => {
                const isOnline = ev.type === 'online';
                const div = document.createElement('div');
                div.className = 'group flex items-center justify-between p-6 rounded-3xl glass-card border border-white/5 hover:bg-white/5 transition-all';
                div.innerHTML = `
                    <div class="flex items-center gap-6">
                        <div class="text-center w-16">
                            <p class="text-[10px] font-black text-slate-500 uppercase">${new Date(ev.date).toLocaleString('en-US', {month:'short'})}</p>
                            <p class="text-2xl font-black">${new Date(ev.date).getDate()}</p>
                        </div>
                        <div class="h-10 w-[1px] bg-white/10"></div>
                        <div>
                            <p class="text-[10px] font-black ${isOnline ? 'text-cyan-400' : 'text-emerald-400'} uppercase mb-1">${ev.type}</p>
                            <h4 class="text-lg font-bold">${ev.title}</h4>
                            <p class="text-xs text-slate-500">⏰ ${ev.time || '시간 미정'}</p>
                        </div>
                    </div>
                    <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button onclick="deleteEvent(${ev.id})" class="p-2 rounded-lg bg-red-500/20 text-red-500 hover:bg-red-500 hover:text-white transition">🗑️</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function addEvent() {
            const title = document.getElementById('ev-title').value;
            const date = document.getElementById('ev-date').value;
            const time = document.getElementById('ev-time').value;
            const type = document.getElementById('ev-type').value;

            if(!title || !date) return alert('제목과 날짜를 입력하세요.');

            events.push({ id: Date.now(), title, date, time, type });
            renderEvents();
            document.getElementById('ev-title').value = '';
        }

        function deleteEvent(id) {
            events = events.filter(e => e.id !== id);
            renderEvents();
        }

        function saveAll() {
            AppStorage.save('meetup_events', events);
        }

        document.addEventListener('DOMContentLoaded', renderEvents);
    </script>
</body>
</html>
