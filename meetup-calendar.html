<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>온/오프라인 밋업 통합관리 - WORLD AI</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="antialiased bg-bg-light dark:bg-bg-dark text-slate-900 dark:text-slate-100 transition-colors duration-300">
    <div class="min-h-screen flex flex-col">
        <!-- Header -->
        <header class="w-full bg-white/60 dark:bg-[#030509]/30 backdrop-blur-md border-b border-black/5 dark:border-white/5 px-8 py-3.5 flex justify-between items-center sticky top-0 z-50">
            <a href="index.html" class="flex items-center space-x-3">
                <div class="text-xl font-black tracking-tighter flex items-center gap-2">
                    <div class="w-5 h-5 rounded-full bg-gradient-to-tr from-cyan-400 via-indigo-500 to-purple-500 relative flex items-center justify-center shadow-inner">
                        <div class="absolute w-6.5 h-2.5 border border-white/50 rounded-full rotate-[-30deg]"></div>
                    </div>
                    <span class="text-slate-900 dark:text-white font-extrabold text-lg tracking-wide uppercase">WORLD AI</span>
                </div>
            </a>
            <div class="flex items-center space-x-3">
                <button id="theme-toggle" class="p-2 rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors">
                    <span id="theme-icon">🌙</span>
                </button>
                <a href="index.html" class="px-4 py-1.5 rounded-full border border-black/10 dark:border-white/10 text-slate-700 dark:text-gray-200 text-xs transition font-bold">HOME</a>
            </div>
        </header>

        <main class="flex-grow p-8 max-w-6xl mx-auto w-full">
            <div class="flex flex-col md:flex-row justify-between items-end mb-12 gap-6">
                <div>
                    <h1 class="text-5xl font-black text-slate-900 dark:text-white mb-3 tracking-tighter">🗓️ 온/오프라인 밋업</h1>
                    <p class="text-slate-500 dark:text-gray-400 font-medium italic">구글 캘린더 연동 및 통합 일정 관리 시스템</p>
                </div>
                <div class="flex gap-4">
                    <button onclick="saveAll()" class="px-8 py-3.5 rounded-2xl bg-indigo-600 hover:bg-indigo-500 text-white font-black text-sm transition shadow-[0_0_20px_rgba(79,70,229,0.3)] active:scale-95">💾 변경사항 저장</button>
                    <button onclick="toggleAddForm()" class="px-8 py-3.5 rounded-2xl bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-black text-sm transition active:scale-95">+ 일정 추가</button>
                </div>
            </div>

            <!-- Google Calendar Section -->
            <div class="glass-card rounded-[3rem] border border-black/5 dark:border-white/10 shadow-2xl mb-12 overflow-hidden aspect-video">
                <iframe src="https://calendar.google.com/calendar/embed?src=ko.south_korea%23holiday%40group.v.calendar.google.com&ctz=Asia%2FSeoul" style="border: 0" width="100%" height="100%" frameborder="0" scrolling="no"></iframe>
            </div>

            <div class="grid lg:grid-cols-4 gap-8">
                <!-- Sidebar Form -->
                <div id="add-form" class="lg:col-span-1 hidden animate-in">
                    <div class="glass-card p-8 rounded-[2.5rem] border border-black/5 dark:border-white/10 shadow-2xl sticky top-24">
                        <h3 class="text-xl font-black mb-6">신규 일정</h3>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">유형</label>
                                <select id="ev-type" class="w-full px-4 py-3 rounded-xl bg-black/5 dark:bg-white/5 border border-black/10 dark:border-white/10 text-sm focus:border-indigo-500 focus:outline-none">
                                    <option value="online">🌐 온라인</option>
                                    <option value="offline">📍 오프라인</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">제목</label>
                                <input type="text" id="ev-title" class="w-full px-4 py-3 rounded-xl bg-black/5 dark:bg-white/5 border border-black/10 dark:border-white/10 text-sm focus:border-indigo-500 focus:outline-none" placeholder="밋업 제목">
                            </div>
                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">날짜 / 시간</label>
                                <div class="grid grid-cols-2 gap-2">
                                    <input type="date" id="ev-date" class="w-full px-3 py-3 rounded-xl bg-black/5 dark:bg-white/5 border border-black/10 dark:border-white/10 text-xs focus:border-indigo-500 focus:outline-none">
                                    <input type="time" id="ev-time" class="w-full px-3 py-3 rounded-xl bg-black/5 dark:bg-white/5 border border-black/10 dark:border-white/10 text-xs focus:border-indigo-500 focus:outline-none">
                                </div>
                            </div>
                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">장소/링크</label>
                                <input type="text" id="ev-loc" class="w-full px-4 py-3 rounded-xl bg-black/5 dark:bg-white/5 border border-black/10 dark:border-white/10 text-sm focus:border-indigo-500 focus:outline-none" placeholder="주소 또는 URL">
                            </div>
                            <button onclick="addEvent()" class="w-full py-4 mt-2 rounded-2xl bg-indigo-600 text-white font-black text-sm transition hover:opacity-90 active:scale-95 shadow-xl">등록하기</button>
                        </div>
                    </div>
                </div>

                <!-- Main Content (Timeline/List) -->
                <div id="event-list" class="lg:col-span-4 space-y-6">
                    <!-- Events will be rendered here -->
                </div>
            </div>
        </main>

        <footer class="p-12 border-t border-black/5 dark:border-white/5 text-center text-[10px] font-black text-slate-400 uppercase tracking-[0.4em]">
            © 2026 World AI. Unified Management.
        </footer>
    </div>

    <script src="js/main.js"></script>
    <script>
        let events = AppStorage.load('meetup_events') || [];

        function renderEvents() {
            const container = document.getElementById('event-list');
            container.innerHTML = '';

            if (events.length === 0) {
                container.innerHTML = `
                    <div class="py-32 text-center glass-card rounded-[3rem] border border-black/5 dark:border-white/10">
                        <div class="text-6xl mb-6 opacity-20">🗓️</div>
                        <h3 class="text-2xl font-black text-slate-400">등록된 일정이 없습니다</h3>
                        <p class="text-slate-500 text-sm mt-2">상단의 '+ 일정 추가' 버튼을 눌러 첫 일정을 등록하세요.</p>
                    </div>
                `;
                return;
            }

            const sorted = [...events].sort((a, b) => new Date(a.date) - new Date(b.date));

            sorted.forEach((ev) => {
                const dateObj = new Date(ev.date);
                const month = dateObj.toLocaleString('en-US', { month: 'short' }).toUpperCase();
                const day = dateObj.getDate();
                const isOnline = ev.type === 'online';

                const card = document.createElement('div');
                card.className = 'group flex items-center justify-between p-8 rounded-[2.5rem] glass-card border border-black/5 dark:border-white/10 shadow-xl hover:shadow-2xl transition-all hover:scale-[1.01]';
                card.innerHTML = `
                    <div class="flex items-center gap-8">
                        <div class="flex flex-col items-center justify-center w-24 h-24 rounded-3xl ${isOnline ? 'bg-cyan-50 dark:bg-cyan-950/20 border-cyan-100 dark:border-cyan-500/20' : 'bg-emerald-50 dark:bg-emerald-950/20 border-emerald-100 dark:border-emerald-500/20'} border transition-colors">
                            <span class="text-[11px] font-black ${isOnline ? 'text-cyan-500' : 'text-emerald-500'} uppercase mb-1">${month}</span>
                            <span class="text-4xl font-black text-slate-900 dark:text-white">${day}</span>
                        </div>
                        <div>
                            <div class="flex items-center gap-3 mb-2">
                                <span class="px-3 py-1 rounded-full text-[10px] font-black ${isOnline ? 'bg-cyan-100 dark:bg-cyan-900/40 text-cyan-600 dark:text-cyan-400' : 'bg-emerald-100 dark:bg-emerald-900/40 text-emerald-600 dark:text-emerald-400'} uppercase tracking-widest">${ev.type}</span>
                                <span class="text-sm font-bold text-slate-400">⏰ ${ev.time || '시간 미정'}</span>
                            </div>
                            <h3 class="text-2xl font-black text-slate-900 dark:text-white tracking-tight">${ev.title}</h3>
                            <p class="text-sm text-slate-500 dark:text-gray-400 mt-2 flex items-center gap-2">
                                📍 ${ev.loc || (isOnline ? '온라인 미팅' : '장소 미등록')}
                            </p>
                        </div>
                    </div>
                    <div class="flex items-center gap-4 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button onclick="deleteEvent(${ev.id})" class="p-4 rounded-2xl bg-black/5 dark:bg-white/5 text-slate-400 hover:text-red-500 transition-colors">🗑️</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function toggleAddForm() {
            const form = document.getElementById('add-form');
            const list = document.getElementById('event-list');
            const isHidden = form.classList.contains('hidden');
            if (isHidden) {
                form.classList.remove('hidden');
                list.classList.replace('lg:col-span-4', 'lg:col-span-3');
            } else {
                form.classList.add('hidden');
                list.classList.replace('lg:col-span-3', 'lg:col-span-4');
            }
        }

        function addEvent() {
            const title = document.getElementById('ev-title').value;
            const date = document.getElementById('ev-date').value;
            const time = document.getElementById('ev-time').value;
            const loc = document.getElementById('ev-loc').value;
            const type = document.getElementById('ev-type').value;

            if(!title || !date) return alert('제목과 날짜는 필수입니다.');

            const newEv = { id: Date.now(), title, date, time, loc, type };
            events.push(newEv);
            renderEvents();
            document.getElementById('ev-title').value = '';
            toggleAddForm();
        }

        function deleteEvent(id) {
            if(!confirm('정말 삭제하시겠습니까?')) return;
            events = events.filter(e => e.id !== id);
            renderEvents();
        }

        function saveAll() {
            AppStorage.save('meetup_events', events);
        }

        document.addEventListener('DOMContentLoaded', renderEvents);
    </script>
</body>
</html>
